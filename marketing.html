/* ---- session ---- */
let SESSION = null;
try {
  SESSION = JSON.parse(localStorage.getItem(LS_KEY) || "null");
} catch (e) {}
function setSession(s) {
  SESSION = s && s.access_token ? s : null;
  try {
    if (SESSION) localStorage.setItem(LS_KEY, JSON.stringify(SESSION));else localStorage.removeItem(LS_KEY);
  } catch (e) {}
}
async function refreshSession() {
  if (!SESSION || !SESSION.refresh_token) return false;
  try {
    const r = await fetch(AUTH + "/token?grant_type=refresh_token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY
      },
      body: JSON.stringify({
        refresh_token: SESSION.refresh_token
      })
    });
    if (!r.ok) return false;
    setSession(await r.json());
    return true;
  } catch (e) {
    return false;
  }
}
async function authSignIn(email, password) {
  const r = await fetch(AUTH + "/token?grant_type=password", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY
    },
    body: JSON.stringify({
      email,
      password
    })
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error_description || d.msg || d.error || "Belépés sikertelen");
  return d;
}

/* ---- Claude hívás a proxyn keresztül ---- */
async function askClaude(system, userText, _retry) {
  const r = await fetch(PROXY, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + (SESSION ? SESSION.access_token : SUPABASE_KEY)
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1024,
      system: system,
      messages: [{
        role: "user",
        content: userText
      }]
    })
  });
  if (r.status === 401 && SESSION && !_retry) {
    const ok = await refreshSession();
    if (ok) return askClaude(system, userText, true);
  }
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || data.message || "Hiba (" + r.status + ")");
  if (data.error) throw new Error(typeof data.error === "string" ? data.error : data.error.message || "API hiba");
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();
  if (!text) throw new Error("Üres válasz érkezett.");
  return text;
}
